<!DOCTYPE html>
<html>
<head>
  <title>Group Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="groupName">Group</h2>
</div>

<div class="panel">

  <input id="searchInput" placeholder="Search student..." onkeyup="searchStudent()">

  <div class="add-box">
    <input id="studentInput" placeholder="Оқушы аты (Kazakh name)">
    <button onclick="addStudent()">Add</button>
  </div>

  <ul id="studentList"></ul>

  <button class="finish">Finish Attendance</button>

</div>

<script src="script.js"></script>

</body>
</html>
